name: Service05.Api - QA and Veracode Upload And Scan

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "src/services/Service05.Api/**"
      - "src/shared/**"
      - "Directory.Build.props"
      - ".github/workflows/service05-api-veracode.yml"
  push:
    branches: [main]
    paths:
      - "src/services/Service05.Api/**"
      - "src/shared/**"
      - "Directory.Build.props"
      - ".github/workflows/service05-api-veracode.yml"

permissions:
  contents: read

concurrency:
  group: veracode-service05-api
  cancel-in-progress: false

env:
  SERVICE_NAME: Service05.Api
  SERVICE_PROJECT: src/services/Service05.Api/Service05.Api.csproj
  VERACODE_APP_NAME: lca-appsec.lab-microservices.Service05.Api

jobs:
  qa:
    name: QA - Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore "$SERVICE_PROJECT"

      - name: Build with warnings as errors
        run: dotnet build "$SERVICE_PROJECT" -c Release --no-restore -warnaserror

      - name: Publish smoke test
        run: |
          dotnet publish "$SERVICE_PROJECT" \
            -c Release \
            -f net8.0 \
            -o qa-publish \
            -p:UseAppHost=false \
            --no-restore

  veracode_upload_and_scan:
    name: Veracode Upload And Scan
    runs-on: ubuntu-latest
    needs: qa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Restore dependencies
        run: dotnet restore "$SERVICE_PROJECT"

      - name: Create Veracode package
        run: ./scripts/package-service-for-veracode.sh "$SERVICE_NAME"

      - name: Show package info
        run: |
          ls -lh "artifacts/$SERVICE_NAME-veracode-upload.zip"
          unzip -Z1 "artifacts/$SERVICE_NAME-veracode-upload.zip" | grep -E '\.dll$' | sort

      - name: Veracode Upload And Scan
        uses: veracode/veracode-uploadandscan-action@0.2.10
        with:
          appname: "${{ env.VERACODE_APP_NAME }}"
          createprofile: true
          filepath: "artifacts/${{ env.SERVICE_NAME }}-veracode-upload.zip"
          version: "GitHub-${{ github.run_number }}-${{ github.sha }}"
          vid: "${{ secrets.VERACODE_API_ID }}"
          vkey: "${{ secrets.VERACODE_API_KEY }}"
          criticality: VeryHigh
          scanallnonfataltoplevelmodules: true
          includenewmodules: true
          deleteincompletescan: 1
          maxretrycount: 3
          scanpollinginterval: 120
          scantimeout: 60
