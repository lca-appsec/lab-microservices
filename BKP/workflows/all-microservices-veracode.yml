name: All Microservices - QA and Veracode Upload And Scan

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "src/services/**"
      - "src/shared/**"
      - "Directory.Build.props"
      - "scripts/package-all-services-for-veracode.sh"
      - ".github/workflows/all-microservices-veracode.yml"
  push:
    branches: [main]
    paths:
      - "src/services/**"
      - "src/shared/**"
      - "Directory.Build.props"
      - "scripts/package-all-services-for-veracode.sh"
      - ".github/workflows/all-microservices-veracode.yml"

permissions:
  contents: read

concurrency:
  group: veracode-all-microservices
  cancel-in-progress: false

env:
  VERACODE_APP_NAME: lca-appsec.lab-microservices
  VERACODE_PACKAGE: veracode-upload.zip

jobs:
  qa:
    name: QA - Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore solution
        run: dotnet restore VeracodeMicroservicesLab.slnx

      - name: Build with warnings as errors
        run: dotnet build VeracodeMicroservicesLab.slnx -c Release --no-restore -warnaserror

      - name: Publish smoke test
        run: ./scripts/package-all-services-for-veracode.sh

      - name: Check deduplicated package
        run: |
          ls -lh "$VERACODE_PACKAGE"
          echo "Total DLL entries:"
          unzip -Z1 "$VERACODE_PACKAGE" | grep -E '\.dll$' | wc -l
          echo "Unique DLL names:"
          unzip -Z1 "$VERACODE_PACKAGE" | grep -E '\.dll$' | sed 's#.*/##' | sort -u | wc -l

  veracode_upload_and_scan:
    name: Veracode Upload And Scan
    runs-on: ubuntu-latest
    needs: qa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Restore solution
        run: dotnet restore VeracodeMicroservicesLab.slnx

      - name: Create deduplicated Veracode package
        run: ./scripts/package-all-services-for-veracode.sh

      - name: Show package info
        run: |
          ls -lh "$VERACODE_PACKAGE"
          unzip -Z1 "$VERACODE_PACKAGE" | grep -E '\.dll$' | sort

      - name: Veracode Upload And Scan
        uses: veracode/veracode-uploadandscan-action@0.2.10
        with:
          appname: "${{ env.VERACODE_APP_NAME }}"
          createprofile: true
          filepath: "${{ env.VERACODE_PACKAGE }}"
          version: "GitHub-${{ github.run_number }}-${{ github.sha }}"
          vid: "${{ secrets.VERACODE_API_ID }}"
          vkey: "${{ secrets.VERACODE_API_KEY }}"
          criticality: VeryHigh
          scanallnonfataltoplevelmodules: true
          includenewmodules: true
          deleteincompletescan: 1
          maxretrycount: 3
          scanpollinginterval: 120
          scantimeout: 60